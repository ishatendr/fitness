<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Fitness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #E7E4D8; }
  #root { min-height: 100vh; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 0.9s linear infinite; }
  button { font: inherit; }
  input::placeholder { color: #A9A493; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

/* ---------------------------------------------------------
   Design tokens
--------------------------------------------------------- */
const T = {
  paper: "#E7E4D8",
  paperRaised: "#F1EEE3",
  ink: "#22291F",
  inkSoft: "#5B6355",
  hanko: "#AE3A2E",
  teal: "#3E6659",
  line: "#C9C4B2",
  cardBorder: "#D3CFBF",
};

/* ---------------------------------------------------------
   Tiny inline icons (no external icon library needed)
--------------------------------------------------------- */
const Icon = {
  Check: (p) => (
    <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={3} strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
  ),
  Flame: (p) => (
    <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 2c1 4-4 5-4 10a4 4 0 0 0 8 0c0-1-1-2-1-3 2 1 3 3 3 5a6 6 0 0 1-12 0c0-5 3-6 3-9 0-1 1-2 3-3z" />
    </svg>
  ),
  Scale: (p) => (
    <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <line x1="12" y1="3" x2="12" y2="21" />
      <line x1="4" y1="7" x2="20" y2="7" />
      <path d="M4 7l-2.5 6a3 3 0 0 0 5 0L4 7z" />
      <path d="M20 7l-2.5 6a3 3 0 0 0 5 0L20 7z" />
      <line x1="8" y1="21" x2="16" y2="21" />
    </svg>
  ),
  Dumbbell: (p) => (
    <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="9" width="3" height="6" rx="0.5"/>
      <rect x="19" y="9" width="3" height="6" rx="0.5"/>
      <rect x="6" y="7" width="2.5" height="10" rx="0.5"/>
      <rect x="15.5" y="7" width="2.5" height="10" rx="0.5"/>
      <line x1="8.5" y1="12" x2="15.5" y2="12" />
    </svg>
  ),
  ChevronLeft: (p) => (
    <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <polyline points="15 18 9 12 15 6" />
    </svg>
  ),
  ChevronRight: (p) => (
    <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  ),
  Loader: (p) => (
    <svg className="spin" width={p.size||22} height={p.size||22} viewBox="0 0 24 24" fill="none" stroke={p.color||"#000"} strokeWidth={2} strokeLinecap="round">
      <path d="M12 2 A10 10 0 0 1 22 12" />
    </svg>
  ),
};

/* ---------------------------------------------------------
   Week helpers — pure LOCAL date arithmetic only
--------------------------------------------------------- */
function pad2(n) { return String(n).padStart(2, "0"); }
function toLocalDateStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function parseLocalDateStr(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function startOfWeek(d) {
  const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const day = (date.getDay() + 6) % 7; // Mon=0
  date.setDate(date.getDate() - day);
  return date;
}
function weekId(d) { return toLocalDateStr(startOfWeek(d)); }
function fmtRange(weekIdStr) {
  const s = parseLocalDateStr(weekIdStr);
  const e = new Date(s);
  e.setDate(e.getDate() + 6);
  const f = (dt) => `${dt.getMonth() + 1}/${dt.getDate()}`;
  return `${f(s)} - ${f(e)}`;
}
function addWeeks(weekIdStr, n) {
  const s = parseLocalDateStr(weekIdStr);
  s.setDate(s.getDate() + n * 7);
  return weekId(s);
}

/* ---------------------------------------------------------
   Workout definition — 週3回、同じ全身メニューを繰り返す
--------------------------------------------------------- */
const STRENGTH_EXERCISES = [
  { id: "squat", name: "スクワット", note: "加圧バンド(脚) 15-25回 × 3" },
  { id: "pushup", name: "プッシュアップ", note: "加圧バンド(腕) 15-20回 × 3" },
  { id: "hinge", name: "ヒップヒンジ", note: "自重/負荷 12-15回 × 3" },
  { id: "core", name: "プランク / レッグレイズ", note: "30-60秒 × 3" },
];
const SESSION_DEFS = [
  { id: "s1", label: "筋トレ ①" },
  { id: "s2", label: "筋トレ ②" },
  { id: "s3", label: "筋トレ ③" },
];
function emptySessionData() { return Object.fromEntries(STRENGTH_EXERCISES.map((e) => [e.id, false])); }
function emptyWeekData() { return { s1: emptySessionData(), s2: emptySessionData(), s3: emptySessionData(), weight: null }; }
function isSessionComplete(sessionData) {
  if (!sessionData) return false;
  return STRENGTH_EXERCISES.every((e) => sessionData[e.id]);
}

/* ---------------------------------------------------------
   Storage — plain localStorage (this page runs standalone,
   not inside a Claude artifact, so browser storage is fine
   and is in fact required here).
--------------------------------------------------------- */
const STORAGE_KEY = "fitness-tracker-v2";
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore, fall back to default */ }
  return { weeks: {} };
}
function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error("save failed", e);
  }
}

/* ---------------------------------------------------------
   Hanko stamp
--------------------------------------------------------- */
function Hanko({ show }) {
  return (
    <div style={{
      position: "absolute", top: "50%", right: 14,
      transform: `translateY(-50%) rotate(-9deg) scale(${show ? 1 : 0.5})`,
      opacity: show ? 1 : 0, transition: "all 320ms cubic-bezier(.34,1.56,.64,1)",
      width: 52, height: 52, borderRadius: 8, border: `2.5px solid ${T.hanko}`, color: T.hanko,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 20, letterSpacing: 1,
      pointerEvents: "none", mixBlendMode: "multiply",
    }}>済</div>
  );
}
function HankoSmall() {
  return (
    <div style={{
      transform: "rotate(-9deg)", border: `2px solid ${T.hanko}`, color: T.hanko, borderRadius: 6,
      width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 13, mixBlendMode: "multiply",
    }}>済</div>
  );
}

/* ---------------------------------------------------------
   Session card
--------------------------------------------------------- */
function SessionCard({ def, data, onToggleExercise }) {
  const complete = isSessionComplete(data);
  return (
    <div style={{ position: "relative", background: T.paperRaised, border: `1px solid ${T.cardBorder}`, borderRadius: 4, padding: "16px 18px", marginBottom: 12, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <Icon.Dumbbell size={16} color={T.teal} />
        <span style={{ fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 15, color: T.ink, letterSpacing: 0.5 }}>{def.label}</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {STRENGTH_EXERCISES.map((ex) => {
          const checked = !!data[ex.id];
          return (
            <button key={ex.id} onClick={() => onToggleExercise(def.id, ex.id)}
              style={{ display: "flex", alignItems: "center", gap: 10, background: "transparent", border: "none", padding: "4px 0", cursor: "pointer", textAlign: "left", width: "100%" }}>
              <span style={{
                width: 18, height: 18, flexShrink: 0, borderRadius: 4,
                border: `1.5px solid ${checked ? T.teal : T.inkSoft}`, background: checked ? T.teal : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center", transition: "all 150ms ease",
              }}>
                {checked && <Icon.Check size={12} color={T.paperRaised} />}
              </span>
              <span style={{ fontFamily: "'Noto Sans JP', sans-serif" }}>
                <span style={{ fontSize: 13.5, color: T.ink, textDecoration: checked ? "line-through" : "none", opacity: checked ? 0.55 : 1 }}>{ex.name}</span>
                <span style={{ fontSize: 11, color: T.inkSoft, marginLeft: 8, fontFamily: "'JetBrains Mono', monospace" }}>{ex.note}</span>
              </span>
            </button>
          );
        })}
      </div>
      <Hanko show={complete} />
    </div>
  );
}

/* ---------------------------------------------------------
   Weight card
--------------------------------------------------------- */
function WeightCard({ weight, onSave }) {
  const [input, setInput] = useState(weight != null ? String(weight) : "");
  useEffect(() => { setInput(weight != null ? String(weight) : ""); }, [weight]);
  const commit = () => {
    const v = parseFloat(input);
    if (!isNaN(v) && v > 20 && v < 400) onSave(v);
  };
  return (
    <div style={{ background: T.paperRaised, border: `1px solid ${T.cardBorder}`, borderRadius: 4, padding: "16px 18px", marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <Icon.Scale size={16} color={T.hanko} />
        <span style={{ fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 15, color: T.ink, letterSpacing: 0.5 }}>今週の体重測定</span>
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)} onBlur={commit}
          onKeyDown={(e) => e.key === "Enter" && e.currentTarget.blur()} inputMode="decimal" placeholder="--.-"
          style={{
            width: 90, fontFamily: "'JetBrains Mono', monospace", fontSize: 26, fontWeight: 500, color: T.ink,
            background: "transparent", border: "none", borderBottom: `1.5px solid ${T.inkSoft}`, outline: "none", padding: "2px 0",
          }} />
        <span style={{ fontFamily: "'Noto Sans JP', sans-serif", fontSize: 13, color: T.inkSoft }}>kg</span>
        {weight != null && <span style={{ marginLeft: "auto" }}><HankoSmall /></span>}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Lightweight weight chart (no chart library dependency)
--------------------------------------------------------- */
function WeightChart({ series }) {
  const W = 320, H = 130, padL = 34, padR = 10, padT = 10, padB = 20;
  const weights = series.map((s) => s.weight);
  const min = Math.min(...weights) - 1;
  const max = Math.max(...weights) + 1;
  const xStep = (W - padL - padR) / Math.max(series.length - 1, 1);
  const yFor = (v) => padT + (H - padT - padB) * (1 - (v - min) / (max - min || 1));
  const xFor = (i) => padL + i * xStep;
  const points = series.map((s, i) => `${xFor(i)},${yFor(s.weight)}`).join(" ");

  return (
    <div style={{ background: T.paperRaised, border: `1px solid ${T.cardBorder}`, borderRadius: 4, padding: "16px 12px 8px", marginBottom: 12 }}>
      <div style={{ fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 14, color: T.ink, marginBottom: 8, paddingLeft: 6 }}>体重推移</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
        {[0, 0.5, 1].map((t, i) => {
          const y = padT + (H - padT - padB) * t;
          const v = (max - (max - min) * t).toFixed(1);
          return (
            <g key={i}>
              <line x1={padL} x2={W - padR} y1={y} y2={y} stroke={T.line} strokeDasharray="2 3" />
              <text x={2} y={y + 3} fontSize="9" fontFamily="JetBrains Mono" fill={T.inkSoft}>{v}</text>
            </g>
          );
        })}
        <polyline points={points} fill="none" stroke={T.hanko} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {series.map((s, i) => (
          <circle key={i} cx={xFor(i)} cy={yFor(s.weight)} r="3" fill={T.hanko} />
        ))}
        {series.map((s, i) => (
          <text key={i} x={xFor(i)} y={H - 4} fontSize="9" fontFamily="JetBrains Mono" fill={T.inkSoft} textAnchor="middle">{s.label}</text>
        ))}
      </svg>
    </div>
  );
}

/* ---------------------------------------------------------
   Main App
--------------------------------------------------------- */
function FitnessTracker() {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState({ weeks: {} });
  const [currentWeek, setCurrentWeek] = useState(() => weekId(new Date()));
  const todayWeek = useMemo(() => weekId(new Date()), []);

  useEffect(() => {
    setData(loadData());
    setLoading(false);
  }, []);

  const persist = useCallback((next) => {
    setData(next);
    saveData(next);
  }, []);

  const weekData = data.weeks[currentWeek] || emptyWeekData();

  const updateWeek = (mutator) => {
    const next = {
      ...data,
      weeks: { ...data.weeks, [currentWeek]: mutator({ ...emptyWeekData(), ...data.weeks[currentWeek] }) },
    };
    persist(next);
  };

  const toggleExercise = (sessionId, exId) => {
    updateWeek((wd) => ({ ...wd, [sessionId]: { ...wd[sessionId], [exId]: !wd[sessionId][exId] } }));
  };
  const saveWeight = (v) => { updateWeek((wd) => ({ ...wd, weight: v })); };

  const canGoForward = currentWeek < todayWeek;

  const stats = useMemo(() => {
    const entries = Object.entries(data.weeks).sort(([a], [b]) => (a < b ? -1 : 1));
    const weightSeries = entries
      .filter(([, w]) => w.weight != null)
      .map(([wk, w]) => ({ week: wk, label: fmtRange(wk).split(" - ")[0], weight: w.weight }));

    let streak = 0;
    const sortedDesc = [...entries].reverse();
    for (const [wk, wd] of sortedDesc) {
      if (wk === todayWeek) continue;
      const completedAll = SESSION_DEFS.every((s) => isSessionComplete(wd[s.id]));
      if (completedAll) streak++; else break;
    }
    const totalWeeksTracked = entries.length;
    const totalSessionsDone = entries.reduce((acc, [, wd]) => acc + SESSION_DEFS.filter((s) => isSessionComplete(wd[s.id])).length, 0);
    return { weightSeries, streak, totalWeeksTracked, totalSessionsDone };
  }, [data, todayWeek]);

  const sessionsDoneThisWeek = SESSION_DEFS.filter((s) => isSessionComplete(weekData[s.id])).length;

  if (loading) {
    return (
      <div style={{ minHeight: 400, display: "flex", alignItems: "center", justifyContent: "center", background: T.paper }}>
        <Icon.Loader size={22} color={T.inkSoft} />
      </div>
    );
  }

  return (
    <div style={{ background: T.paper, minHeight: "100vh", fontFamily: "'Noto Sans JP', sans-serif" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "28px 18px 60px" }}>
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 2, color: T.inkSoft, textTransform: "uppercase", marginBottom: 4 }}>Weekly Training Chart</div>
          <h1 style={{ fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 26, color: T.ink, margin: 0, letterSpacing: 1 }}>週3トレーニング記録</h1>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 10, background: T.ink, color: T.paper, borderRadius: 4, padding: "10px 16px", marginBottom: 20 }}>
          <Icon.Flame size={16} color="#E0A96D" />
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, letterSpacing: 0.5 }}>連続達成 {stats.streak} 週</span>
          <span style={{ marginLeft: "auto", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, opacity: 0.7 }}>記録 {stats.totalWeeksTracked} 週 / 完了 {stats.totalSessionsDone} 回</span>
        </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, borderBottom: `1px solid ${T.line}`, paddingBottom: 10 }}>
          <button onClick={() => setCurrentWeek((w) => addWeeks(w, -1))}
            style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: T.ink }} aria-label="前の週" title="前の週へ">
            <Icon.ChevronLeft />
          </button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, color: T.ink, fontWeight: 500 }}>{fmtRange(currentWeek)}</div>
            <div style={{ fontFamily: "'Noto Sans JP', sans-serif", fontSize: 11, color: T.inkSoft, marginTop: 2 }}>
              {currentWeek === todayWeek ? "今週" : ""} ・ {sessionsDoneThisWeek} / 3 完了
            </div>
          </div>
          <button onClick={() => canGoForward && setCurrentWeek((w) => addWeeks(w, 1))} disabled={!canGoForward}
            style={{ background: "none", border: "none", cursor: canGoForward ? "pointer" : "not-allowed", padding: 4, opacity: canGoForward ? 1 : 0.28, color: T.ink }}
            aria-label="次の週" title={canGoForward ? "次の週へ" : "今週より先には進めません"}>
            <Icon.ChevronRight />
          </button>
        </div>

        {SESSION_DEFS.map((def) => (
          <SessionCard key={def.id} def={def} data={weekData[def.id]} onToggleExercise={toggleExercise} />
        ))}

        <WeightCard weight={weekData.weight} onSave={saveWeight} />

        {stats.weightSeries.length >= 2 && <WeightChart series={stats.weightSeries} />}

        <div style={{ textAlign: "center", fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: T.inkSoft, opacity: 0.6, marginTop: 24, letterSpacing: 0.5 }}>
          記録はこのブラウザに保存されます(端末・ブラウザが変わると引き継がれません)
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FitnessTracker />);
</script>
</body>
</html>
